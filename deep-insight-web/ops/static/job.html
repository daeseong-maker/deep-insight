<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Insight — Job Detail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0d0f13;
            --bg-surface: #161921;
            --bg-card: #1c2029;
            --bg-elevated: #232833;
            --border: #2a2f3a;
            --border-hover: #3d445a;
            --text-primary: #e8eaf0;
            --text-secondary: #dce0eb;
            --text-muted: #a8b2c8;
            --accent: #4a7cff;
            --accent-glow: rgba(74, 124, 255, 0.15);
            --accent-hover: #6190ff;
            --green: #34d399;
            --green-bg: rgba(52, 211, 153, 0.1);
            --red: #f87171;
            --red-bg: rgba(248, 113, 113, 0.1);
            --amber: #fbbf24;
            --amber-bg: rgba(251, 191, 36, 0.1);
            --radius: 12px;
            --radius-sm: 8px;
            --radius-xs: 6px;
            --font-display: 'Outfit', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-display);
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
        }
        .header-left { display: flex; align-items: center; gap: 1rem; }
        .header-title { font-size: 1.2rem; font-weight: 700; }
        .header-badge {
            font-size: 0.75rem;
            color: var(--accent);
            background: var(--accent-glow);
            border: 1px solid rgba(74, 124, 255, 0.3);
            padding: 0.2rem 0.6rem;
            border-radius: var(--radius-xs);
        }
        .header-right { display: flex; align-items: center; gap: 1rem; }
        .btn-sm {
            padding: 0.4rem 1rem;
            background: var(--bg-elevated);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-xs);
            font-family: var(--font-display);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }
        .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
        .lang-area { display: flex; align-items: center; gap: 0.5rem; }
        .lang-label { color: var(--text-secondary); font-size: 0.9rem; font-weight: 600; }
        .lang-toggle {
            padding: 0.35rem 0.9rem;
            background: var(--accent-glow);
            color: var(--accent);
            border: 1px solid rgba(74, 124, 255, 0.3);
            border-radius: var(--radius-xs);
            font-family: var(--font-display);
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .lang-toggle:hover { color: var(--text-primary); border-color: var(--accent); background: rgba(74, 124, 255, 0.2); }
        .content { padding: 2rem; max-width: 800px; }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--accent); }
        .detail-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
        }
        .detail-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        .detail-title { font-size: 1.1rem; font-weight: 700; }
        .status {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: var(--radius-xs);
            font-size: 0.8rem;
            font-weight: 600;
        }
        .status-success { color: var(--green); background: var(--green-bg); }
        .status-failed { color: var(--red); background: var(--red-bg); }
        .status-start { color: var(--amber); background: var(--amber-bg); }
        .stale-badge { color: var(--red); font-size: 0.75rem; font-weight: 600; margin-left: 0.4rem; }
        .detail-row {
            display: flex;
            padding: 0.6rem 0;
            border-bottom: 1px solid var(--border);
        }
        .detail-row:last-child { border-bottom: none; }
        .detail-label {
            width: 140px;
            flex-shrink: 0;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
        }
        .detail-value {
            font-size: 0.9rem;
            word-break: break-word;
        }
        .detail-value.mono {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .query-text {
            background: var(--bg-elevated);
            padding: 0.8rem 1rem;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            line-height: 1.5;
            white-space: pre-wrap;
        }
        .report-link {
            color: var(--accent);
            text-decoration: none;
            font-family: var(--font-mono);
            font-size: 0.8rem;
        }
        .report-link:hover { text-decoration: underline; }
        .error-text { color: var(--red); }
        .loading { text-align: center; color: var(--text-muted); padding: 3rem; font-size: 1rem; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="header-title" data-i18n="admin_title">Deep Insight Admin</div>
            <div class="header-badge" data-i18n="admin_badge">Admin</div>
        </div>
        <div class="header-right">
            <a href="/admin/dashboard" class="btn-sm" data-i18n="admin_all_jobs">All Jobs</a>
            <div class="lang-area">
                <span class="lang-label">Language</span>
                <button class="lang-toggle" id="admin-lang-toggle" onclick="toggleAdminLang()">EN</button>
            </div>
            <a href="/" class="btn-sm" data-i18n="admin_webui">Web UI</a>
            <button class="btn-sm" onclick="handleLogout()" data-i18n="admin_logout">Logout</button>
        </div>
    </div>

    <div class="content">
        <a href="/admin/dashboard" class="back-link" data-i18n="back_all_jobs">Back to all jobs</a>
        <div id="jobDetail" class="loading" data-i18n="detail_loading">Loading job details...</div>
    </div>

    <script src="/admin/static/admin-i18n.js"></script>
    <script>
        var currentJob = null;

        function formatTime(epoch) {
            if (!epoch) return '-';
            var d = new Date(epoch * 1000);
            var y = d.getFullYear();
            var mo = String(d.getMonth() + 1).padStart(2, '0');
            var day = String(d.getDate()).padStart(2, '0');
            var h = String(d.getHours()).padStart(2, '0');
            var m = String(d.getMinutes()).padStart(2, '0');
            var s = String(d.getSeconds()).padStart(2, '0');
            return y + '-' + mo + '-' + day + ' ' + h + ':' + m + ':' + s;
        }

        function formatDuration(seconds) {
            if (!seconds) return '-';
            if (seconds < 60) return seconds + 's';
            var min = Math.floor(seconds / 60);
            var sec = seconds % 60;
            return min + 'm ' + sec + 's';
        }

        function formatTokens(n) {
            if (!n) return '-';
            return n.toLocaleString();
        }

        function isStale(job) {
            if (job.status !== 'Start') return false;
            var now = Math.floor(Date.now() / 1000);
            return (now - job.started_at) > 1800;
        }

        function addRow(container, label, valueNode) {
            var row = document.createElement('div');
            row.className = 'detail-row';

            var labelDiv = document.createElement('div');
            labelDiv.className = 'detail-label';
            labelDiv.textContent = label;

            var valueDiv = document.createElement('div');
            valueDiv.className = 'detail-value';
            if (typeof valueNode === 'string') {
                valueDiv.textContent = valueNode;
            } else {
                valueDiv.appendChild(valueNode);
            }

            row.appendChild(labelDiv);
            row.appendChild(valueDiv);
            container.appendChild(row);
        }

        function addMonoRow(container, label, text) {
            var row = document.createElement('div');
            row.className = 'detail-row';

            var labelDiv = document.createElement('div');
            labelDiv.className = 'detail-label';
            labelDiv.textContent = label;

            var valueDiv = document.createElement('div');
            valueDiv.className = 'detail-value mono';
            valueDiv.textContent = text;

            row.appendChild(labelDiv);
            row.appendChild(valueDiv);
            container.appendChild(row);
        }

        function renderJob(job) {
            var wrapper = document.getElementById('jobDetail');
            wrapper.className = 'detail-card';
            wrapper.replaceChildren();

            // Header: title + status
            var header = document.createElement('div');
            header.className = 'detail-header';

            var title = document.createElement('div');
            title.className = 'detail-title';
            title.textContent = t('detail_title');
            header.appendChild(title);

            var statusSpan = document.createElement('span');
            statusSpan.className = 'status status-' + job.status.toLowerCase();
            statusSpan.textContent = t('status_' + job.status.toLowerCase());
            header.appendChild(statusSpan);

            if (isStale(job)) {
                var staleSpan = document.createElement('span');
                staleSpan.className = 'stale-badge';
                staleSpan.textContent = t('jobs_stale');
                header.appendChild(staleSpan);
            }

            wrapper.appendChild(header);

            // Rows
            addMonoRow(wrapper, t('label_job_id'), job.job_id || '-');

            // Query (styled block)
            if (job.user_query) {
                var queryDiv = document.createElement('div');
                queryDiv.className = 'query-text';
                queryDiv.textContent = job.user_query;
                addRow(wrapper, t('label_query'), queryDiv);
            } else {
                addRow(wrapper, t('label_query'), '-');
            }

            addMonoRow(wrapper, t('label_session_id'), job.session_id || '-');
            addMonoRow(wrapper, t('label_started'), formatTime(job.started_at));
            addMonoRow(wrapper, t('label_completed'), formatTime(job.ended_at));
            addMonoRow(wrapper, t('label_duration'), formatDuration(job.elapsed_seconds));
            addMonoRow(wrapper, t('label_total_tokens'), formatTokens(job.total_tokens));
            addMonoRow(wrapper, t('label_input_tokens'), formatTokens(job.input_tokens));
            addMonoRow(wrapper, t('label_output_tokens'), formatTokens(job.output_tokens));
            addMonoRow(wrapper, t('label_cache_read'), formatTokens(job.cache_read_input_tokens));
            addMonoRow(wrapper, t('label_cache_write'), formatTokens(job.cache_creation_input_tokens));
            addMonoRow(wrapper, t('label_cache_hit'), job.cache_hit_rate != null ? job.cache_hit_rate + '%' : '-');

            // Report file (with download link if session_id exists)
            if (job.report_filename && job.session_id) {
                var link = document.createElement('a');
                link.className = 'report-link';
                link.textContent = job.report_filename;
                link.href = '/download/' + encodeURIComponent(job.session_id) + '/' + encodeURIComponent(job.report_filename);
                addRow(wrapper, t('label_report'), link);
            } else {
                addMonoRow(wrapper, t('label_report'), job.report_filename || '-');
            }

            // Error (if failed)
            if (job.error_message) {
                var errorSpan = document.createElement('span');
                errorSpan.className = 'error-text';
                errorSpan.textContent = job.error_message;
                addRow(wrapper, t('label_error'), errorSpan);
            }
        }

        async function fetchJob() {
            var pathParts = window.location.pathname.split('/');
            var jobId = pathParts[pathParts.length - 1];

            try {
                var res = await fetch('/admin/api/jobs/' + encodeURIComponent(jobId));
                if (res.status === 401) {
                    window.location.href = '/admin/login';
                    return;
                }
                var data = await res.json();
                if (data.success) {
                    currentJob = data.job;
                    renderJob(currentJob);
                    document.title = 'Deep Insight — Job ' + (currentJob.status || '');
                } else {
                    var wrapper = document.getElementById('jobDetail');
                    wrapper.className = 'loading';
                    wrapper.textContent = data.error || t('detail_not_found');
                }
            } catch (e) {
                var wrapper = document.getElementById('jobDetail');
                wrapper.className = 'loading';
                wrapper.textContent = t('detail_load_error');
            }
        }

        async function handleLogout() {
            await fetch('/admin/logout', { method: 'POST' });
            window.location.href = '/admin/login';
        }

        // Re-render detail when language changes
        function onLangChange() {
            if (currentJob) renderJob(currentJob);
        }

        applyAdminLang();
        fetchJob();
    </script>
</body>
</html>
