<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Insight — Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0d0f13;
            --bg-surface: #161921;
            --bg-card: #1c2029;
            --bg-elevated: #232833;
            --border: #2a2f3a;
            --border-hover: #3d445a;
            --text-primary: #e8eaf0;
            --text-secondary: #dce0eb;
            --text-muted: #a8b2c8;
            --accent: #4a7cff;
            --accent-glow: rgba(74, 124, 255, 0.15);
            --accent-hover: #6190ff;
            --green: #34d399;
            --green-bg: rgba(52, 211, 153, 0.1);
            --red: #f87171;
            --red-bg: rgba(248, 113, 113, 0.1);
            --amber: #fbbf24;
            --amber-bg: rgba(251, 191, 36, 0.1);
            --radius: 12px;
            --radius-sm: 8px;
            --radius-xs: 6px;
            --font-display: 'Outfit', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-display);
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
        }
        .header-left { display: flex; align-items: center; gap: 1rem; }
        .header-title { font-size: 1.2rem; font-weight: 700; }
        .header-badge {
            font-size: 0.75rem;
            color: var(--accent);
            background: var(--accent-glow);
            border: 1px solid rgba(74, 124, 255, 0.3);
            padding: 0.2rem 0.6rem;
            border-radius: var(--radius-xs);
        }
        .header-right { display: flex; align-items: center; gap: 1rem; }
        .refresh-info { color: var(--text-muted); font-size: 0.8rem; }
        .btn-sm {
            padding: 0.4rem 1rem;
            background: var(--bg-elevated);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-xs);
            font-family: var(--font-display);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }
        .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
        .lang-area { display: flex; align-items: center; gap: 0.5rem; }
        .lang-label { color: var(--text-secondary); font-size: 0.9rem; font-weight: 600; }
        .lang-toggle {
            padding: 0.35rem 0.9rem;
            background: var(--accent-glow);
            color: var(--accent);
            border: 1px solid rgba(74, 124, 255, 0.3);
            border-radius: var(--radius-xs);
            font-family: var(--font-display);
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .lang-toggle:hover { color: var(--text-primary); border-color: var(--accent); background: rgba(74, 124, 255, 0.2); }
        .filters { display: flex; gap: 0.5rem; padding: 1rem 2rem; }
        .filter-btn {
            padding: 0.4rem 1rem;
            background: var(--bg-elevated);
            color: var(--text-muted);
            border: 1px solid var(--border);
            border-radius: var(--radius-xs);
            font-family: var(--font-display);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn:hover { border-color: var(--border-hover); color: var(--text-secondary); }
        .filter-btn.active {
            background: var(--accent-glow);
            color: var(--accent);
            border-color: rgba(74, 124, 255, 0.3);
        }
        .filter-count { font-size: 0.75rem; margin-left: 0.3rem; opacity: 0.7; }
        .table-wrapper { padding: 0 2rem 2rem; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th {
            text-align: left;
            padding: 0.7rem 1rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        td {
            padding: 0.8rem 1rem;
            font-size: 0.9rem;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        tr.job-row { cursor: pointer; transition: background 0.15s; }
        tr.job-row:hover { background: var(--bg-elevated); }
        .status {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: var(--radius-xs);
            font-size: 0.8rem;
            font-weight: 600;
        }
        .status-success { color: var(--green); background: var(--green-bg); }
        .status-failed { color: var(--red); background: var(--red-bg); }
        .status-start { color: var(--amber); background: var(--amber-bg); }
        .stale-badge { color: var(--red); font-size: 0.75rem; font-weight: 600; margin-left: 0.4rem; }
        .query-cell { max-width: 300px; overflow: hidden; text-overflow: ellipsis; }
        .mono { font-family: var(--font-mono); font-size: 0.8rem; color: var(--text-muted); }
        .empty-state { text-align: center; color: var(--text-muted); padding: 3rem; font-size: 1rem; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="header-title" data-i18n="admin_title">Deep Insight Admin</div>
            <div class="header-badge" data-i18n="admin_badge">Admin</div>
        </div>
        <div class="header-right">
            <span class="refresh-info" id="refreshInfo" data-i18n="admin_refresh">Auto-refresh: 30s</span>
            <div class="lang-area">
                <span class="lang-label">Language</span>
                <button class="lang-toggle" id="admin-lang-toggle" onclick="toggleAdminLang()">EN</button>
            </div>
            <a href="/" class="btn-sm" data-i18n="admin_webui">Web UI</a>
            <button class="btn-sm" onclick="handleLogout()" data-i18n="admin_logout">Logout</button>
        </div>
    </div>

    <div class="filters">
        <button class="filter-btn active" data-status="" onclick="setFilter(this)">
            <span data-i18n="filter_all">All</span> <span class="filter-count" id="countAll"></span>
        </button>
        <button class="filter-btn" data-status="Start" onclick="setFilter(this)">
            <span data-i18n="filter_start">Start</span> <span class="filter-count" id="countStart"></span>
        </button>
        <button class="filter-btn" data-status="Success" onclick="setFilter(this)">
            <span data-i18n="filter_success">Success</span> <span class="filter-count" id="countSuccess"></span>
        </button>
        <button class="filter-btn" data-status="Failed" onclick="setFilter(this)">
            <span data-i18n="filter_failed">Failed</span> <span class="filter-count" id="countFailed"></span>
        </button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th data-i18n="th_status">Status</th>
                    <th data-i18n="th_query">Query</th>
                    <th data-i18n="th_started">Started</th>
                    <th data-i18n="th_duration">Duration</th>
                    <th data-i18n="th_tokens">Tokens</th>
                    <th data-i18n="th_cache_hit">Cache Hit</th>
                    <th data-i18n="th_report">Report</th>
                </tr>
            </thead>
            <tbody id="jobsBody">
            </tbody>
        </table>
    </div>

    <script src="/admin/static/admin-i18n.js"></script>
    <script>
        var allJobs = [];
        var currentFilter = '';

        function formatTime(epoch) {
            if (!epoch) return '-';
            var d = new Date(epoch * 1000);
            var mo = String(d.getMonth() + 1).padStart(2, '0');
            var day = String(d.getDate()).padStart(2, '0');
            var h = String(d.getHours()).padStart(2, '0');
            var m = String(d.getMinutes()).padStart(2, '0');
            return mo + '-' + day + ' ' + h + ':' + m;
        }

        function formatDuration(seconds) {
            if (!seconds) return '-';
            if (seconds < 60) return seconds + 's';
            var min = Math.floor(seconds / 60);
            var sec = seconds % 60;
            return min + 'm ' + sec + 's';
        }

        function formatTokens(n) {
            if (!n) return '-';
            return n.toLocaleString();
        }

        function isStale(job) {
            if (job.status !== 'Start') return false;
            var now = Math.floor(Date.now() / 1000);
            return (now - job.started_at) > 1800;
        }

        function createCell(text, className) {
            var td = document.createElement('td');
            td.textContent = text;
            if (className) td.className = className;
            return td;
        }

        function renderJobs() {
            var filtered = currentFilter
                ? allJobs.filter(function(j) { return j.status === currentFilter; })
                : allJobs;

            document.getElementById('countAll').textContent = '(' + allJobs.length + ')';
            document.getElementById('countStart').textContent = '(' + allJobs.filter(function(j) { return j.status === 'Start'; }).length + ')';
            document.getElementById('countSuccess').textContent = '(' + allJobs.filter(function(j) { return j.status === 'Success'; }).length + ')';
            document.getElementById('countFailed').textContent = '(' + allJobs.filter(function(j) { return j.status === 'Failed'; }).length + ')';

            var tbody = document.getElementById('jobsBody');
            tbody.replaceChildren();

            if (filtered.length === 0) {
                var tr = document.createElement('tr');
                var td = document.createElement('td');
                td.colSpan = 7;
                td.className = 'empty-state';
                td.textContent = t('jobs_empty');
                tr.appendChild(td);
                tbody.appendChild(tr);
                return;
            }

            filtered.forEach(function(job) {
                var tr = document.createElement('tr');
                tr.className = 'job-row';
                tr.addEventListener('click', function() {
                    window.location.href = '/admin/dashboard/' + encodeURIComponent(job.job_id);
                });

                // Status cell
                var statusTd = document.createElement('td');
                var statusSpan = document.createElement('span');
                statusSpan.className = 'status status-' + job.status.toLowerCase();
                statusSpan.textContent = t('status_' + job.status.toLowerCase());
                statusTd.appendChild(statusSpan);
                if (isStale(job)) {
                    var staleSpan = document.createElement('span');
                    staleSpan.className = 'stale-badge';
                    staleSpan.textContent = t('jobs_stale');
                    statusTd.appendChild(staleSpan);
                }
                tr.appendChild(statusTd);

                // Query cell
                var queryTd = document.createElement('td');
                queryTd.className = 'query-cell';
                queryTd.textContent = (job.user_query || '').substring(0, 60);
                queryTd.title = job.user_query || '';
                tr.appendChild(queryTd);

                // Started
                tr.appendChild(createCell(formatTime(job.started_at), 'mono'));

                // Duration
                var duration = job.elapsed_seconds
                    ? formatDuration(job.elapsed_seconds)
                    : (job.status === 'Start' ? t('jobs_running') : '-');
                tr.appendChild(createCell(duration, 'mono'));

                // Tokens
                tr.appendChild(createCell(formatTokens(job.total_tokens), 'mono'));

                // Cache hit
                var cacheHit = job.cache_hit_rate != null ? job.cache_hit_rate + '%' : '-';
                tr.appendChild(createCell(cacheHit, 'mono'));

                // Report
                tr.appendChild(createCell(job.report_filename || '-', 'mono'));

                tbody.appendChild(tr);
            });
        }

        function setFilter(btn) {
            document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            currentFilter = btn.dataset.status;
            renderJobs();
        }

        async function fetchJobs() {
            try {
                var res = await fetch('/admin/api/jobs');
                if (res.status === 401) {
                    window.location.href = '/admin/login';
                    return;
                }
                var data = await res.json();
                if (data.success) {
                    allJobs = data.jobs;
                    renderJobs();
                }
            } catch (e) {
                console.error('Failed to fetch jobs:', e);
            }
        }

        async function handleLogout() {
            await fetch('/admin/logout', { method: 'POST' });
            window.location.href = '/admin/login';
        }

        // Re-render table when language changes
        function onLangChange() {
            renderJobs();
        }

        applyAdminLang();
        fetchJobs();
        setInterval(fetchJobs, 30000);
    </script>
</body>
</html>
